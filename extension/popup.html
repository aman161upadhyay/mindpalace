<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mind Palace</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e18;
      --bg2: #161625;
      --bg3: #1e1e30;
      --border: rgba(255,255,255,0.08);
      --primary: #7c6af7;
      --primary-light: #a89df9;
      --text: #e8e8f0;
      --text-muted: #8888a8;
      --success: #22c55e;
      --error: #ef4444;
      --radius: 8px;
    }

    body {
      width: 360px;
      min-height: 200px;
      max-height: 560px;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      overflow: hidden;
    }

    /* ─── Header ─── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--bg2);
    }
    .header-left { display: flex; align-items: center; gap: 8px; }
    .logo {
      width: 26px; height: 26px; border-radius: 6px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
    }
    .title { font-weight: 600; font-size: 13px; }
    .header-actions { display: flex; gap: 4px; }
    .icon-btn {
      width: 28px; height: 28px; border-radius: 6px;
      background: transparent; border: none; cursor: pointer;
      color: var(--text-muted); display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, color 0.15s;
    }
    .icon-btn:hover { background: var(--bg3); color: var(--text); }
    .icon-btn svg { width: 14px; height: 14px; }

    /* ─── Views ─── */
    .view { display: none; flex-direction: column; }
    .view.active { display: flex; }

    /* ─── Main View ─── */
    #view-main { flex: 1; }

    .shortcut-bar {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      padding: 8px 14px;
      background: linear-gradient(135deg, rgba(99,102,241,0.1), rgba(139,92,246,0.1));
      border-bottom: 1px solid var(--border);
      font-size: 11px; color: var(--text-muted);
    }
    kbd {
      padding: 1px 5px; border-radius: 4px;
      background: var(--bg3); border: 1px solid var(--border);
      font-family: monospace; font-size: 11px; color: var(--text);
    }

    .section-title {
      padding: 10px 14px 6px;
      font-size: 10px; font-weight: 600; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--text-muted);
    }

    /* ─── Highlight Items ─── */
    #highlights-list { overflow-y: auto; max-height: 340px; }

    .highlight-item {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      cursor: default;
      transition: background 0.12s;
    }
    .highlight-item:hover { background: var(--bg2); }
    .highlight-item:last-child { border-bottom: none; }

    .hi-text {
      font-style: italic;
      font-size: 12px;
      line-height: 1.55;
      color: var(--text);
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 5px;
    }
    .hi-meta {
      display: flex; align-items: center; justify-content: space-between;
      font-size: 10px; color: var(--text-muted);
    }
    .hi-domain { display: flex; align-items: center; gap: 3px; }
    .hi-domain svg { width: 10px; height: 10px; }

    /* ─── Empty State ─── */
    .empty-state {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 32px 20px; text-align: center; gap: 8px;
    }
    .empty-icon { font-size: 28px; opacity: 0.4; }
    .empty-title { font-weight: 500; color: var(--text); font-size: 13px; }
    .empty-desc { font-size: 11px; color: var(--text-muted); line-height: 1.5; }

    /* ─── Footer ─── */
    .footer {
      padding: 10px 14px;
      border-top: 1px solid var(--border);
      background: var(--bg2);
    }
    .btn-primary {
      width: 100%; padding: 8px 12px; border-radius: var(--radius);
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border: none; cursor: pointer; color: white;
      font-size: 12px; font-weight: 600; letter-spacing: 0.01em;
      transition: transform 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94), background 0.2s ease, opacity 0.2s ease;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      overflow: hidden;
      position: relative;
    }
    .btn-primary:hover {
      opacity: 0.95;
      transform: scale(1.03);
    }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary svg { width: 13px; height: 13px; }

    /* ─── Settings View ─── */
    #view-settings { padding: 14px; gap: 12px; }
    .settings-title {
      font-size: 13px; font-weight: 600; margin-bottom: 2px;
    }
    .settings-desc { font-size: 11px; color: var(--text-muted); line-height: 1.5; }

    .field { display: flex; flex-direction: column; gap: 4px; }
    .field label { font-size: 11px; font-weight: 500; color: var(--text-muted); }
    .field input {
      padding: 7px 10px; border-radius: var(--radius);
      background: var(--bg3); border: 1px solid var(--border);
      color: var(--text); font-size: 12px; font-family: monospace;
      outline: none; transition: border-color 0.15s;
    }
    .field input:focus { border-color: var(--primary); }
    .field input::placeholder { color: var(--text-muted); font-family: inherit; }

    .btn-save {
      padding: 8px 12px; border-radius: var(--radius);
      background: var(--primary); border: none; cursor: pointer;
      color: white; font-size: 12px; font-weight: 600;
      transition: opacity 0.15s; width: 100%;
    }
    .btn-save:hover { opacity: 0.85; }

    .status-msg {
      font-size: 11px; padding: 6px 10px; border-radius: 6px;
      text-align: center; display: none;
    }
    .status-msg.success { background: rgba(34,197,94,0.15); color: var(--success); display: block; }
    .status-msg.error { background: rgba(239,68,68,0.15); color: var(--error); display: block; }

    /* ─── Loading ─── */
    .spinner {
      width: 16px; height: 16px; border: 2px solid var(--border);
      border-top-color: var(--primary); border-radius: 50%;
      animation: spin 0.7s linear infinite; margin: 20px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .noise-overlay {
      position: fixed; inset: 0; z-index: 50; pointer-events: none; opacity: 0.05;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }
  </style>
</head>
<body>
  <div class="noise-overlay"></div>
  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="logo">✦</div>
      <span class="title">Mind Palace</span>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="btn-settings" title="Settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Main View -->
  <div class="view active" id="view-main">
    <div class="shortcut-bar">
      Select text → press <kbd>Ctrl</kbd>+<kbd>Shift</kbd>+<kbd>S</kbd> to save
    </div>

    <div class="section-title">Recent Highlights</div>
    <div id="highlights-list">
      <div class="spinner"></div>
    </div>

    <div class="footer">
      <button class="btn-primary" id="btn-open-dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
          <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
        </svg>
        Open Full Mind Palace
      </button>
    </div>
  </div>

  <!-- Settings View -->
  <div class="view" id="view-settings">
    <div>
      <div class="settings-title">Extension Settings</div>
      <div class="settings-desc">Connect the extension to your Mind Palace dashboard.</div>
    </div>

    <div class="field">
      <label>Dashboard URL</label>
      <input type="url" id="input-dashboard-url" placeholder="https://your-mindpalace.manus.space" />
    </div>

    <div class="field">
      <label>API Token</label>
      <input type="password" id="input-api-token" placeholder="hc_••••••••••••••••••••" />
    </div>

    <div id="settings-status" class="status-msg"></div>

    <button class="btn-save" id="btn-save-settings">Save Settings</button>

    <button class="icon-btn" id="btn-back" style="align-self:center; width:auto; padding: 4px 10px; font-size:11px; color: var(--text-muted);">
      ← Back
    </button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
